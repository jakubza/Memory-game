<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Minecraft Memory Game</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>
<body>
<div id="main">
    <h1>Memory Game MC Edition</h1>
    <button id="START_b">START</button>
    <div class="slider-container">
        <input type="range" min="4" max="10" step="2" value="4" id="difficulty">
        <div class="labels" id="labels">
            <span>4x4</span>
            <span>6x6</span>
            <span>8x8</span>
            <span>10x10</span>
        </div>
    </div>
</div>
</body>
</html>
